name: Sync skills to Multica

on:
  push:
    branches:
      - main
    paths:
      - skills/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-skills:
    name: Sync skills
    runs-on:
      - self-hosted
    steps:
      - name: Check out triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Sync top-level skills
        shell: bash
        env:
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          set -Eeuo pipefail

          repository_name="${GITHUB_REPOSITORY#*/}"

          while IFS=$'\t' read -r skill_id skill_path; do
            if [[ ! -f "${skill_path}/SKILL.md" ]]; then
              echo "Deleting ${skill_path}; it no longer exists at ${SOURCE_COMMIT}"
              multica skill delete "${skill_id}" --yes
            fi
          done < <(
            multica skill list --output json \
              | jq -r \
                --arg owner "${GITHUB_REPOSITORY_OWNER}" \
                --arg repo "${repository_name}" \
                '.[]
                  | select(
                      .config.origin.type == "github"
                      and .config.origin.owner == $owner
                      and .config.origin.repo == $repo
                      and ((.config.origin.path? // "") | test("^skills/[^/]+$"))
                    )
                  | [.id, .config.origin.path]
                  | @tsv'
          )

          skill_files=()
          if [[ -d skills ]]; then
            mapfile -d '' skill_files < <(
              find skills -mindepth 2 -maxdepth 2 -type f -name SKILL.md -print0 \
                | sort -z
            )
          fi

          for skill_file in "${skill_files[@]}"; do
            skill_dir="${skill_file%/SKILL.md}"
            import_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${SOURCE_COMMIT}/${skill_dir}"

            echo "Importing ${skill_dir} from ${SOURCE_COMMIT}"
            multica skill import \
              --url "${import_url}" \
              --on-conflict fail
          done
